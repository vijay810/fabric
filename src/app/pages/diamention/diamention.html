<div class="toolbar">
    <button class="btn btn-warning" (click)="flipSide()">Flip (Front ↔ Back)</button>

    <button class="btn btn-primary" (click)="selectOption('text')">Add Text</button>
    <button class="btn btn-primary" (click)="selectOption('upload')">Upload Image</button>
    <button class="btn btn-primary" (click)="selectOption('gallery')">Gallery</button>
    <button class="btn btn-primary" (click)="clearCanvas()">Clear</button>

    <button class="btn btn-danger" (click)="deleteSelected()">Delete Selected</button>
    <button class="btn btn-success" (click)="exportBoth()">Export Both</button>
</div>

<h4>Current Side: {{ currentSide }}</h4>

<!-- TEXT INPUT -->
<div class="mt-3" *ngIf="selectedOption === 'text'">
    <input [(ngModel)]="textValue" placeholder="Enter text" />
    <button (click)="addText()">Add</button>
</div>

<!-- COLORS + FONTS -->
<div *ngIf="showStyleOptions" class="options-wrapper">
    <h4>Colors</h4>
    <div class="scroll-row">
        <div class="circle" *ngFor="let c of colors" [style.background]="c" (click)="applyColor(c)"></div>
    </div>

    <h4>Fonts</h4>
    <div class="scroll-row">
        <div class="font-card" *ngFor="let f of fontStyles" (click)="applyFont(f)">
            {{ f }}
        </div>
    </div>
</div>

<!-- UPLOAD -->
<div *ngIf="selectedOption === 'upload'">
    <input type="file" accept="image/*" (change)="onImageUpload($event)" />
</div>

<!-- GALLERY -->
<div *ngIf="selectedOption === 'gallery'" class="gallery">
    <img *ngFor="let img of galleryImages" [src]="img" (click)="addGalleryImage(img)" />
</div>

<!-- FRONT -->
<h4>FRONT</h4>
<div class="canvas-wrapper" [class.active]="currentSide === 'front'">
    <canvas #frontCanvas width="200" height="200"></canvas>
</div>

<!-- BACK -->
<h4>BACK</h4>
<div class="canvas-wrapper" [class.active]="currentSide === 'back'">
    <canvas #backCanvas width="200" height="200"></canvas>
</div>
