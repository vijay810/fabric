<div>
    <form [formGroup]="myForm">
        <div class="row">
            <div class="col-sm-3">
                <label for="">Enter Name</label>
                <input type="text" formControlName="name">
                @if(myForm.get('name')?.touched && myForm.get('name')?.errors?.['required']){<div>
                    name is required
                </div>}
            </div>
        </div>
        <div>
            <button class="btn btn-primary" [disabled]="myForm.invalid" type="button"
                (click)="searchBtn()">Search</button>
        </div>
    </form>
</div>

<div>
    <table>
        <thead>
            <tr>
                <th>Sl.no</th>
                <th>Name</th>
                <th>Email</th>
            </tr>
        </thead>
        <tbody>
            @if(nodata){
            <p>No data found</p>
            }@else{
            @for(da of getdata; track $index){
            <tr>
                <td>{{$index + 1}}</td>
                <td>{{da.name}}</td>
                <td>{{da.email}}</td>
            </tr>
            }
            }


        </tbody>
    </table>
</div>
